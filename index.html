<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CupMail - Disposable Email</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
    <style>
        .hidden-view { display: none !important; }
        .toast-enter { transform: translateY(0); opacity: 1; transition: all 0.3s ease-out; }
        .toast-exit { transform: translateY(-20px); opacity: 0; transition: all 0.3s ease-in; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 font-sans antialiased min-h-screen">

    <div id="toast-container" class="fixed top-4 right-4 z-50 flex flex-col gap-2"></div>

    <div id="landing-view" class="max-w-md mx-auto mt-20 bg-white p-8 rounded-xl shadow-lg border border-gray-100">
        <h1 class="text-4xl font-bold text-center mb-2 text-gray-900 tracking-tight">CupMail</h1>
        <p class="text-center text-gray-500 mb-8 text-sm">Instant, intelligent disposable email.</p>
        
        <div class="mb-4">
            <label class="block text-sm font-semibold text-gray-700 mb-1">Username</label>
            <div class="flex shadow-sm rounded-md">
                <input type="text" id="username-input" class="flex-1 border border-gray-300 rounded-l-md px-4 py-2 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition" placeholder="email">
                <button id="btn-random" class="bg-gray-100 px-4 py-2 rounded-r-md border border-l-0 border-gray-300 hover:bg-gray-200 transition font-medium text-gray-700">Random</button>
            </div>
        </div>

        <div class="mb-6">
            <label class="block text-sm font-semibold text-gray-700 mb-1">Domain</label>
            <select id="domain-select" class="w-full border border-gray-300 rounded-md px-4 py-2 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none shadow-sm transition bg-white">
                <option value="mxmail.qzz.io">@mxmail.qzz.io</option>
                <option value="cupmail.qzz.io">@cupmail.qzz.io</option>
                <option value="ist.qzz.io">@ist.qzz.io</option>
            </select>
        </div>

        <div class="mb-6 flex justify-center">
            <div class="cf-turnstile" data-sitekey="0x4AAAAAADsa3KwwGz4zlctK" data-theme="light"></div>
        </div>

        <div class="flex space-x-3">
            <button id="btn-create" class="flex-1 bg-blue-600 text-white font-semibold py-2.5 rounded-md hover:bg-blue-700 transition shadow-sm">Create Inbox</button>
            <button id="btn-copy-create" class="flex-1 bg-gray-900 text-white font-semibold py-2.5 rounded-md hover:bg-black transition shadow-sm">Copy & Create</button>
        </div>
    </div>

    <div id="inbox-view" class="hidden-view max-w-5xl mx-auto p-6 mt-10">
        <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-6 mb-6 flex flex-col md:flex-row justify-between items-start md:items-center">
            <div>
                <h2 id="active-email-display" class="text-3xl font-bold text-gray-900 tracking-tight"></h2>
                <p id="expiry-display" class="text-sm text-red-500 font-medium mt-1"></p>
            </div>
            <button id="btn-change-address" class="mt-4 md:mt-0 px-4 py-2 text-sm font-semibold text-gray-600 bg-gray-100 rounded-md hover:bg-gray-200 transition">Change Address</button>
        </div>

        <div id="extraction-container" class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6 hidden-view">
            <div id="otp-panel" class="bg-white p-6 rounded-xl shadow-sm border border-gray-200 hidden-view">
                <h3 class="text-xs font-bold text-gray-400 mb-3 uppercase tracking-wider">Primary OTP</h3>
                <div class="flex justify-between items-center mb-4">
                    <span id="primary-otp" class="text-4xl font-mono font-bold text-gray-900 tracking-widest"></span>
                    <button id="btn-copy-primary-otp" class="px-4 py-2 bg-blue-50 text-blue-700 rounded-md text-sm font-semibold hover:bg-blue-100 transition">Copy</button>
                </div>
                <div id="other-otps-container" class="mt-4 border-t border-gray-100 pt-3 hidden-view">
                    <p class="text-xs font-medium text-gray-500 mb-2">Other codes found:</p>
                    <div id="other-otps-list" class="space-y-2"></div>
                </div>
            </div>

            <div id="magic-link-panel" class="bg-white p-6 rounded-xl shadow-sm border border-gray-200 hidden-view">
                <h3 class="text-xs font-bold text-gray-400 mb-3 uppercase tracking-wider">Magic Link</h3>
                <div class="flex justify-between items-center mb-4 gap-4">
                    <span id="primary-link-name" class="text-lg font-semibold text-gray-900 truncate flex-1"></span>
                    <div class="flex space-x-2 shrink-0">
                        <a id="btn-open-primary-link" href="#" target="_blank" class="px-4 py-2 bg-green-50 text-green-700 rounded-md text-sm font-semibold hover:bg-green-100 transition">Open</a>
                        <button id="btn-copy-primary-link" class="px-4 py-2 bg-gray-100 text-gray-700 rounded-md text-sm font-semibold hover:bg-gray-200 transition">Copy</button>
                    </div>
                </div>
                <div id="other-links-container" class="mt-4 border-t border-gray-100 pt-3 hidden-view">
                    <p class="text-xs font-medium text-gray-500 mb-2">Other links (May include unsubscribes):</p>
                    <div id="other-links-list" class="space-y-2"></div>
                </div>
            </div>
        </div>

        <h3 class="text-xl font-bold text-gray-900 mb-4">Inbox <span class="text-sm font-normal text-gray-500">(Auto-updating)</span></h3>
        <div id="email-list" class="space-y-3">
            <div class="text-center p-12 bg-white rounded-xl border border-dashed border-gray-300">
                <div class="animate-pulse flex flex-col items-center">
                    <div class="h-10 w-10 bg-gray-200 rounded-full mb-3"></div>
                    <p class="text-gray-500 font-medium">Waiting for incoming emails...</p>
                </div>
            </div>
        </div>
    </div>

    <script type="module" src="./app.js"></script>
</body>
</html>
